kind = "web"
previewPath = "/"
title = "Code Tools"
version = "1.0.0"
id = "artifacts/code-tools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19169

[services.development]
run = "pnpm --filter @workspace/code-tools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/code-tools", "run", "build" ]
publicDir = "artifacts/code-tools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19169"
BASE_PATH = "/"
